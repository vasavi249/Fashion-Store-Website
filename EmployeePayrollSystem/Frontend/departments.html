<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><span style="font-size: 28px; color: var(--primary)">🏢</span> EMP System</div>
            <div class="nav-links" id="nav-links"></div>
            <div class="auth-buttons" id="auth-buttons"></div>
        </div>
    </nav>

    <div class="container" style="margin-top: 40px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2>Departments</h2>
            <button class="btn btn-primary" onclick="alert('Open Add Dept Modal')">+ Add Department</button>
        </div>

        <div class="grid-3" id="dept-grid"></div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if(!App.state.user || App.state.user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }

            try {
                const depts = await App.api('/departments/');
                document.getElementById('dept-grid').innerHTML = depts.map(d => `
                    <div class="card">
                        <h3 style="color: var(--secondary); margin-bottom: 10px;">${d.department_name}</h3>
                        <p style="color: var(--text-light); margin-bottom: 5px;">ID: #${d.department_id}</p>
                        <p style="color: var(--text-light); margin-bottom: 5px;">Manager: <strong>${d.manager_name}</strong></p>
                        <p style="color: var(--text-light); margin-bottom: 5px;">Location: ${d.location}</p>
                        <p style="color: var(--text-light); margin-bottom: 15px;">Total Employees: <strong>${d.total_employees}</strong></p>
                        <button class="btn btn-outline" style="width: 100%;">Edit Department</button>
                    </div>
                `).join('');
            } catch (err) {}
        });
    </script>
</body>
</html>
