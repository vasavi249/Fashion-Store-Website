<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll - Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><span style="font-size: 28px; color: var(--primary)">🏢</span> EMP System</div>
            <div class="nav-links" id="nav-links"></div>
            <div class="auth-buttons" id="auth-buttons"></div>
        </div>
    </nav>

    <div class="container" style="margin-top: 40px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2>Payroll Management</h2>
            <button class="btn btn-primary" onclick="alert('Generate Payroll Modal')">Process Payroll</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Month</th>
                        <th>Employee</th>
                        <th>Basic</th>
                        <th>Bonus</th>
                        <th>Deductions</th>
                        <th>Net Salary</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="payroll-table"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if(!App.state.user || App.state.user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }

            try {
                const payrolls = await App.api('/payroll/');
                document.getElementById('payroll-table').innerHTML = payrolls.reverse().map(p => `
                    <tr>
                        <td>#${p.payroll_id}</td>
                        <td><span class="badge badge-success">${p.payment_month}</span></td>
                        <td style="font-weight: 600;">${p.employee_name}</td>
                        <td>Rs. ${p.basic_salary}</td>
                        <td>Rs. ${p.bonus}</td>
                        <td style="color: var(--danger)">-Rs. ${p.deductions}</td>
                        <td style="font-weight: bold; color: var(--primary)">Rs. ${p.net_salary}</td>
                        <td>
                            <button class="btn btn-outline" style="padding: 4px 8px; font-size: 12px;">Issue Slip</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {}
        });
    </script>
</body>
</html>
