<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management & Payroll System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span style="font-size: 28px; color: var(--primary)">🏢</span>
                EMP System
            </div>
            <div class="nav-links" id="nav-links"></div>
            <div class="auth-buttons" id="auth-buttons"></div>
        </div>
    </nav>

    <div class="container" style="max-width: 500px; margin-top: 80px;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 24px;">Login</h2>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="setRole('employee')" id="btn-emp">Employee</button>
                <button class="btn btn-outline" style="flex: 1;" onclick="setRole('admin')" id="btn-adm">HR / Admin</button>
            </div>

            <form id="login-form">
                <input type="hidden" id="login-role" value="employee">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Redirect if already logged in
        if(App.state.user) {
            window.location.href = App.state.user.role === 'admin' ? 'dashboard.html' : 'attendance.html';
        }

        function setRole(role) {
            document.getElementById('login-role').value = role;
            if(role === 'employee') {
                document.getElementById('btn-emp').className = 'btn btn-primary';
                document.getElementById('btn-adm').className = 'btn btn-outline';
            } else {
                document.getElementById('btn-adm').className = 'btn btn-primary';
                document.getElementById('btn-emp').className = 'btn btn-outline';
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('login-role').value;

            try {
                const employees = await App.api('/employees/');
                // Simple mock authentication for demo
                const user = employees.find(emp => emp.email === email && emp.password === password && emp.role === role);
                
                if(user) {
                    App.setUser(user);
                    App.showToast('Login successful!');
                    setTimeout(() => {
                        window.location.href = role === 'admin' ? 'dashboard.html' : 'attendance.html';
                    }, 1000);
                } else {
                    App.showToast('Invalid credentials or role', 'error');
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
