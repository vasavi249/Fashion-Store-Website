<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Fashion Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">FASHION STORE</a>
        </div>
    </nav>

    <div class="form-container">
        <h2 class="form-title">Create Account</h2>
        <form id="register-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" id="phone" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" id="address" class="form-control" required>
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" id="city" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">REGISTER</button>
            <p style="margin-top: 20px; text-align: center;">Already have an account? <a href="login.html" style="color: var(--primary-color); font-weight: bold;">Login</a></p>
        </form>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                full_name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                role: 'customer'
            };
            
            try {
                await App.api('/customers/add/', 'POST', data);
                App.showToast('Registration successful! Please log in.');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch(err) {
                App.showToast('Error registering', 'error');
            }
        });
    </script>
</body>
</html>
