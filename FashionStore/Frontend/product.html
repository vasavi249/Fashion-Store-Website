<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Fashion Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">FASHION STORE</a>
            <div class="nav-actions">
                <div id="auth-links"></div>
                <div class="icon-btn" onclick="window.location.href='cart.html'">
                    <span>🛒</span>
                    <span>Cart</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="container cart-layout" style="margin-top: 40px;" id="product-details">
        <!-- Load details here -->
        <p>Loading...</p>
    </div>

    <script src="script.js"></script>
    <script>
        let currentProduct = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if(!productId) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                const products = await App.api('/products/');
                currentProduct = products.find(p => p.id === productId);
                
                if(currentProduct) {
                    document.getElementById('product-details').innerHTML = `
                        <div style="background: var(--white); border-radius: 4px; overflow: hidden;">
                            <img src="${currentProduct.image_url}" alt="Product" style="width: 100%; height: 500px; object-fit: cover;">
                        </div>
                        <div style="padding: 20px;">
                            <h2 style="font-size: 24px; margin-bottom: 5px;">${currentProduct.brand}</h2>
                            <p style="color: var(--light-text); font-size: 18px; margin-bottom: 20px;">${currentProduct.product_name}</p>
                            
                            <div style="font-size: 28px; font-weight: bold; margin-bottom: 20px;">Rs. ${currentProduct.price}</div>
                            <p style="color: var(--success); font-weight: bold; margin-bottom: 30px;">inclusive of all taxes</p>
                            
                            <h4 style="margin-bottom: 10px;">Select Size</h4>
                            <div style="display: flex; gap: 10px; margin-bottom: 30px;">
                                <div style="width: 50px; height: 50px; border: 1px solid var(--border-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold;">S</div>
                                <div style="width: 50px; height: 50px; border: 1px solid var(--primary-color); color: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold;">M</div>
                                <div style="width: 50px; height: 50px; border: 1px solid var(--border-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold;">L</div>
                            </div>
                            
                            <button class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 16px;" onclick="addToCart()">ADD TO BAG</button>
                        </div>
                    `;
                }
            } catch (err) {
                console.error(err);
            }
        });

        async function addToCart() {
            if(!App.state.user) {
                App.showToast('Please login to add to cart', 'error');
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }
            
            const cartData = {
                cart_id: Math.floor(Math.random() * 10000),
                customer_name: App.state.user.full_name,
                product_name: currentProduct.product_name,
                quantity: 1,
                price: currentProduct.price,
                total_price: currentProduct.price
            };
            
            try {
                await App.api('/cart/add/', 'POST', cartData);
                App.showToast('Added to cart!');
            } catch(err) {
                App.showToast('Error adding to cart', 'error');
            }
        }
    </script>
</body>
</html>
