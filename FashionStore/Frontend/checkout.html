<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Fashion Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">FASHION STORE</a>
            <div class="nav-actions">
                <div id="auth-links"></div>
            </div>
        </div>
    </nav>

    <div class="container cart-layout">
        <div class="cart-items">
            <h2>Delivery Address</h2>
            <form id="checkout-form" style="margin-top: 20px;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="text" id="phone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address" class="form-control" required>
                </div>
                
                <h3 style="margin: 30px 0 15px;">Payment Method</h3>
                <div class="form-group" style="display: flex; gap: 20px;">
                    <label><input type="radio" name="payment" value="UPI" checked> UPI</label>
                    <label><input type="radio" name="payment" value="Credit Card"> Credit Card</label>
                    <label><input type="radio" name="payment" value="Cash on Delivery"> Cash on Delivery</label>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">CONFIRM & PAY</button>
            </form>
        </div>
        
        <div class="cart-summary">
            <h3 style="margin-bottom: 20px;">Price Details</h3>
            <div class="summary-row">
                <span>Total Amount</span>
                <span id="summary-total" style="font-weight: bold; font-size: 18px; color: var(--primary-color)">Rs. 0</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let orderTotal = 0;
        
        document.addEventListener('DOMContentLoaded', async () => {
            if(!App.state.user) {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('name').value = App.state.user.full_name;
            document.getElementById('phone').value = App.state.user.phone || '';
            document.getElementById('address').value = `${App.state.user.address}, ${App.state.user.city}`;
            
            try {
                const carts = await App.api('/cart/');
                const myCart = carts.filter(c => c.customer_name === App.state.user.full_name);
                
                if(myCart.length === 0) {
                    App.showToast('Your cart is empty!', 'error');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                    return;
                }
                
                myCart.forEach(c => orderTotal += c.total_price);
                orderTotal += 99; // Convenience fee
                document.getElementById('summary-total').textContent = `Rs. ${orderTotal}`;
                
            } catch (err) {
                console.error(err);
            }
        });

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
            
            const orderData = {
                order_id: Math.floor(Math.random() * 10000),
                customer_name: App.state.user.full_name,
                order_date: new Date().toISOString().split('T')[0],
                total_amount: orderTotal,
                payment_method: paymentMethod,
                payment_status: paymentMethod === 'Cash on Delivery' ? 'Pending' : 'Paid',
                delivery_status: 'Processing'
            };
            
            try {
                await App.api('/orders/add/', 'POST', orderData);
                
                // Clear cart for this user (simple implementation: delete one by one)
                const carts = await App.api('/cart/');
                const myCart = carts.filter(c => c.customer_name === App.state.user.full_name);
                for(let item of myCart) {
                    await App.api(`/cart/delete/${item.id}/`, 'DELETE');
                }
                
                App.showToast('Order Placed Successfully!');
                setTimeout(() => window.location.href = 'orders.html', 1500);
            } catch(err) {
                App.showToast('Error placing order', 'error');
            }
        });
    </script>
</body>
</html>
