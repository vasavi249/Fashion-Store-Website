<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fashion Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">FASHION STORE</a>
        </div>
    </nav>

    <div class="form-container">
        <h2 class="form-title">Login</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">LOGIN</button>
            <p style="margin-top: 20px; text-align: center;">New to Fashion Store? <a href="register.html" style="color: var(--primary-color); font-weight: bold;">Create Account</a></p>
        </form>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                // In a real app we'd have a specific login endpoint. 
                // Here we'll just fetch customers and find a match for demo purposes.
                const customers = await App.api('/customers/');
                const user = customers.find(c => c.email === email && c.password === password);
                
                if(user) {
                    App.setUser(user);
                    App.showToast('Login successful!');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    App.showToast('Invalid credentials', 'error');
                }
            } catch(err) {
                App.showToast('Error logging in', 'error');
            }
        });
    </script>
</body>
</html>
